<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8/3 Surprise - Lilcat</title>
    <script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap');

:root{
--bg-pink:#d187a2;
--accent-pink:#ff4d6d;
--envelope-pink:#f06292;
--ui-white:#ffffff;
--glass:rgba(255,255,255,0.95);
--shadow:0 20px 50px rgba(0,0,0,0.3);
}

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:'Quicksand',sans-serif;
background:var(--bg-pink);
touch-action:manipulation;
}

/* BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
pointer-events:none;
}

/* SCENE SYSTEM */

.scene{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:0.8s;
z-index:20;
}

.scene.active{
opacity:1;
visibility:visible;
}

/* LOADING */

#loading-scene{
background:#fff;
z-index:2000;
}

.loader-container{
width:250px;
text-align:center;
}

.loader-bar{
width:100%;
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:20px;
border:1px solid #ddd;
}

.loader-fill{
width:0%;
height:100%;
background:var(--accent-pink);
transition:width 0.3s;
}

/* LILCAT */

.lilcat-intro{
position:absolute;
font-size:80px;
z-index:60;
left:-150px;
top:-150px;
transition:1.5s cubic-bezier(0.68,-0.55,0.27,1.55);

display:flex;
align-items:center;
gap:5px;

background:rgba(255,240,245,0.6);
padding:10px 25px 10px 15px;
border-radius:60px;

backdrop-filter:blur(4px);
box-shadow:0 5px 20px rgba(0,0,0,0.2);
border:2px solid white;
}

.lilcat-intro span{
font-size:50px;
animation:wave 2s infinite;
}

@keyframes wave{
0%,100%{transform:rotate(0)}
25%{transform:rotate(15deg)}
75%{transform:rotate(-10deg)}
}

/* FLOWER BURST */

.burst-container{
position:fixed;
top:55%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:200;
}

.burst-flower{
position:absolute;
font-size:0;
opacity:0;
transform:scale(0);
transition:all 1.2s cubic-bezier(0.34,1.56,0.64,1);
filter:drop-shadow(0 10px 20px rgba(231,76,139,0.5));
}

.burst-flower.show{
font-size:180px;
opacity:1;
transform:scale(1);
}

/* ENVELOPE */

.envelope-wrapper{
position:relative;
width:min(320px,85vw);
height:200px;
margin-bottom:60px;
z-index:40;
}

.envelope-container{
position:absolute;
bottom:0;
width:100%;
height:140px;
background:var(--envelope-pink);
border-radius:0 0 18px 18px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.envelope-flap{
position:absolute;
top:0;
width:0;
height:0;

border-left:50% solid transparent;
border-right:50% solid transparent;
border-top:110px solid #e91e63;

transform-origin:top;
transition:0.8s;
z-index:45;
}

.envelope-wrapper.open .envelope-flap{
transform:rotateX(180deg);
z-index:35;
}

/* LETTER */

.letter-card{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%, -50%) scale(0.85);

width:90%;
max-width:420px;
max-height:75vh;

background:#fff;
border-radius:18px;

padding:clamp(20px,5vw,30px);
box-sizing:border-box;

box-shadow:var(--shadow);
border:6px double #fce4ec;

display:flex;
flex-direction:column;

opacity:0;
transition:1s cubic-bezier(.175,.885,.32,1.275);

z-index:120;
}

.envelope-wrapper.open .letter-card{
transform:translate(-50%, -50%) scale(1);
opacity:1;
}

/* LETTER SCROLL */

.letter-content{
overflow-y:auto;
text-align:left;
padding-right:10px;
line-height:1.8;
margin:15px 0;
}

.letter-content::-webkit-scrollbar{
width:4px;
}

.letter-content::-webkit-scrollbar-thumb{
background:var(--accent-pink);
border-radius:10px;
}

/* DARK BACKGROUND */

.blur-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.35);

opacity:0;
visibility:hidden;

transition:0.4s;

z-index:10;
}

.blur-overlay.active{
opacity:1;
visibility:visible;
}

/* INTRO WORDS */

.word-node{
position:absolute;
font-family:'Pacifico',cursive;
color:#fff;

text-shadow:2px 2px 8px rgba(0,0,0,0.2);

pointer-events:none;

opacity:0;
transform:translate(-50%,-50%) scale(.5);

transition:.8s;

z-index:5;

font-size:clamp(20px,5vw,35px);
}

.word-node.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.word-node.fade-out{
opacity:0;
transform:translate(-50%,-50%) scale(.8);
transition:.5s;
}

/* BUTTON */

.btn{
background:var(--accent-pink);
color:#fff;
border:none;
padding:12px 25px;
border-radius:15px;
cursor:pointer;
font-weight:700;
transition:0.3s;
z-index:130;
}

.btn:hover{
transform:scale(1.05);
}

/* INPUT */

input{
padding:12px;
border-radius:12px;
border:2px solid #ddd;
width:85%;
margin-bottom:15px;
text-align:center;
font-size:16px;
}

/* SPEECH BUBBLE */

.speech-bubble{
position:absolute;
background:#fff;
padding:12px 24px;
border-radius:40px;

font-weight:bold;

box-shadow:0 5px 15px rgba(0,0,0,0.2);
border:2px solid #ffb6c1;

white-space:nowrap;

z-index:70;

animation:popIn .3s ease-out;
}

@keyframes popIn{
0%{transform:translateX(-50%) scale(0)}
80%{transform:translateX(-50%) scale(1.1)}
100%{transform:translateX(-50%) scale(1)}
}
</style></head>
<body>

    <div id="top-notif" style="position:fixed; top:-100px; left:50%; transform:translateX(-50%); z-index:3000; background:#fff; padding:12px 25px; border-radius:50px; border:2px solid var(--accent-pink); transition:0.8s; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        💝 <strong style="color:var(--accent-pink)">Con trai 11ta5 gửi đến các bạn nữ</strong>
    </div>

    <canvas id="bgCanvas"></canvas>
    <div id="blur-overlay" class="blur-overlay"></div>

    <div id="loading-scene" class="scene active">
        <div class="loader-container">
            <div style="font-size: 60px; margin-bottom: 10px;">🌸</div>
            <div class="loader-bar"><div id="loader-fill" class="loader-fill"></div></div>
            <p style="font-weight: 700; color: #666;">Đang chuẩn bị món quà...</p>
        </div>
    </div>

    <div id="intro-scene" class="scene">
        <div id="lilcat" class="lilcat-intro">🐱 <span>🌸</span></div>
    </div>

    <div id="cat-scene" class="scene">
        <div class="glass-box" style="background:var(--glass); padding:40px; border-radius:30px; text-align:center; box-shadow:var(--shadow); width:90%; max-width:380px; border: 4px solid #fff;">
            <div style="font-size: 60px;">🐱</div>
            <div id="lilcat-dialog" style="font-weight:700; color:var(--accent-pink); margin:20px 0; min-height: 2em;">Đang chờ bạn...</div>
            <div id="input-area" style="display:none;">
                <input type="text" id="name-input" placeholder="Tên bạn là gì nhỉ?">
                <br>
                <button class="btn" id="ok-btn">Mở quà ✨</button>
            </div>
            <button class="btn" id="start-btn">Nhận thư</button>
        </div>
    </div>

    <div id="letter-scene" class="scene">
        <div class="envelope-wrapper" id="envelope-wrap">
            <div class="envelope-flap"></div>
            <div class="envelope-container"></div>
            <div class="letter-card">
                <div id="letter-title" style="font-family:'Pacifico'; color:var(--accent-pink); font-size:1.4rem; margin-bottom: 5px;"></div>
                <h3 id="letter-greeting" style="border-bottom: 3px solid var(--accent-pink); display: inline-block; margin: 10px 0; color: #333;"></h3>
                <div class="letter-content">
                    <div id="letter-body" style="white-space: pre-wrap;"></div>
                </div>
                <div id="letter-footer" style="margin-top: 15px; font-weight: bold; text-align: right; color:#8e44ad; font-style: italic;"></div>
            </div>
        </div>
        <button class="btn" style="z-index: 31; background:#fff; color:var(--accent-pink); position: absolute; bottom: 5vh;" onclick="resetToMenu()">Quay lại ↩</button>
    </div>

<script>
const introWords = ["Chào mừng", "Ngày Quốc tế", "Phụ nữ", "Chúc mừng", "Ngày 8/3", "Vui vẻ!"];

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

let particles = [];
let introWordElements = [];

/* ================= BACKGROUND ================= */

function initBg(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    particles = Array.from({length:30},()=>({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        v:Math.random()*0.4+0.2,
        s:Math.random()*12+15,
        t:['🌸','💖','✨'][Math.floor(Math.random()*3)]
    }));
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.font=`${p.s}px Arial`;
        ctx.fillText(p.t,p.x,p.y);

        p.y+=p.v;
        if(p.y>canvas.height) p.y=-20;
    });

    requestAnimationFrame(draw);
}

/* ================= TYPEWRITER ================= */

function typeWrite(id,text,speed,callback){
    const el=document.getElementById(id);
    el.innerHTML="";

    let i=0;

    function run(){
        if(i<text.length){
            el.innerHTML+=text.charAt(i);
            i++;
            setTimeout(run,speed);
        }
        else if(callback) callback();
    }

    run();
}

/* ================= SCENE TRANSITION ================= */

function transitionTo(id){
    document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ================= FLOWER BURST ================= */

function flowerBurst(emoji="🌹",duration=2000){

    const burstDiv=document.createElement('div');
    burstDiv.className='burst-container';

    const flower=document.createElement('div');
    flower.className='burst-flower';
    flower.innerText=emoji;

    burstDiv.appendChild(flower);
    document.body.appendChild(burstDiv);

    setTimeout(()=>flower.classList.add('show'),30);

    setTimeout(()=>{
        burstDiv.remove();
    },duration);
}

/* ================= INTRO WORD CLEANUP ================= */

function removeIntroWords(){
    document.querySelectorAll('#intro-scene .word-node').forEach(el=>el.remove());
    introWordElements=[];
}

/* ================= RANDOM OPENING ================= */

function getRandomOpening(name){

    if(!window.letterConfig || !window.letterConfig.openings){
        return `Gửi ${name} thân yêu ❤️`;
    }

    const randomIndex=Math.floor(Math.random()*window.letterConfig.openings.length);

    return window.letterConfig.openings[randomIndex].replace('{name}',name);
}

/* ================= LILCAT INTRO ================= */

function startIntro(){

    document.getElementById('top-notif').style.top="20px";

    const cx=window.innerWidth/2;
    const cy=window.innerHeight/2;

    const r=Math.min(window.innerWidth,window.innerHeight)*0.3;

    /* WORD CIRCLE */

    introWords.forEach((word,i)=>{

        setTimeout(()=>{

            const angle=(i/introWords.length)*Math.PI*2;

            const div=document.createElement('div');
            div.className='word-node';
            div.innerText=word;

            div.style.left=`${cx+r*Math.cos(angle)}px`;
            div.style.top=`${cy+r*Math.sin(angle)}px`;

            document.getElementById('intro-scene').appendChild(div);

            introWordElements.push(div);

            setTimeout(()=>div.classList.add('show'),50);

        },i*400);

    });

    /* MOVE CAT TO CENTER */

    setTimeout(()=>{

        const cat=document.getElementById('lilcat');

        cat.style.left='50%';
        cat.style.top='50%';
        cat.style.transform='translate(-50%, -50%)';

        /* SPEECH BUBBLE */

        setTimeout(()=>{

            const dialogBubble=document.createElement('div');

            dialogBubble.className='speech-bubble';
            dialogBubble.innerText="Tặng hoa cho người đẹp nè!";

            dialogBubble.style.top='calc(50% + 70px)';
            dialogBubble.style.left='50%';
            dialogBubble.style.transform='translateX(-50%)';

            document.getElementById('intro-scene').appendChild(dialogBubble);

            /* FLOWER BURST AFTER CAT TALKS */

            setTimeout(()=>{
                flowerBurst("🌹",2500);
            },1200);

            /* FADE WORDS */

            introWordElements.forEach(el=>el.classList.add('fade-out'));

            /* REMOVE + TRANSITION */

            setTimeout(()=>{

                dialogBubble.remove();
                removeIntroWords();

                transitionTo('cat-scene');

            },2500);

        },800);

    },introWords.length*400+500);
}

/* ================= BUTTON EVENTS ================= */

document.getElementById('start-btn').onclick=()=>{

    document.getElementById('start-btn').style.display='none';

    typeWrite(
        'lilcat-dialog',
        "À... cho mình biết tên bạn trước đã nhé?",
        30,
        ()=>{document.getElementById('input-area').style.display='block'}
    );
};

/* ================= OPEN LETTER ================= */

document.getElementById('ok-btn').onclick = () => {

    const name = document.getElementById('name-input').value.trim();
    if(!name) return;

    document.getElementById('input-area').style.display='none';

    typeWrite(
        'lilcat-dialog',
        `Có thư cho ${name} nè! Đợi xíu...`,
        30
    );

    const nameLower = name.toLowerCase();

    const specialMatch = window.letterConfig?.specialNames?.find(
        n => n.toLowerCase() === nameLower
    );

    let letter;

    if(specialMatch){

        const upperName = specialMatch.charAt(0).toUpperCase() + specialMatch.slice(1).toLowerCase();

        letter = window.letterConfig.custom[upperName] || window.letterConfig.default[0];

    }else{

        const defaultLetters = window.letterConfig?.default || [
            {
                sender:"Lilcat",
                message:["Chúc bạn một ngày 8/3 thật ý nghĩa!","Hãy luôn tỏa sáng nhé!"]
            }
        ];

        letter = defaultLetters[Math.floor(Math.random()*defaultLetters.length)];
    }

    const greeting = getRandomOpening(name);

    /* TRANSITION TO LETTER */

    setTimeout(() => {

        transitionTo('letter-scene');

        document.getElementById('blur-overlay').classList.add('active');

        setTimeout(() => {

            document.getElementById('envelope-wrap').classList.add('open');

            const letterCard = document.querySelector('.letter-card');

            letterCard.style.zIndex = '100';

            setTimeout(() => {

                typeWrite('letter-title',"🌹 Chúc mừng 8/3!",40,()=>{

                    typeWrite('letter-greeting',greeting,40,()=>{

                        const msg = Array.isArray(letter.message)
                            ? letter.message.join("\n\n")
                            : letter.message;

                        typeWrite('letter-body',msg,25,()=>{

                            typeWrite('letter-footer',`-- ${letter.sender} --`,40);

                        });

                    });

                });

            },1200);

        },800);

    },1500);

};
/* ================= RESET ================= */

function resetToMenu(){

    document.getElementById('envelope-wrap').classList.remove('open');

    document.getElementById('blur-overlay').classList.remove('active');

    document.getElementById('name-input').value="";

    document.getElementById('input-area').style.display='none';

    document.getElementById('start-btn').style.display='inline-block';

    document.getElementById('lilcat-dialog').innerText="Có một món quà khác cho bạn...";

    removeIntroWords();

    const cat=document.getElementById('lilcat');

    cat.style.left='-150px';
    cat.style.top='-150px';
    cat.style.transform='none';

    transitionTo('cat-scene');
}

/* ================= PAGE LOAD ================= */

window.onload=()=>{

    initBg();
    draw();

    let p=0;

    const itv=setInterval(()=>{

        p+=Math.random()*15;

        document.getElementById('loader-fill').style.width=Math.min(p,100)+"%";

        if(p>=100){

            clearInterval(itv);

            setTimeout(()=>{
                transitionTo('intro-scene');
                startIntro();
            },500);

        }

    },120);

};

window.onresize=initBg;
</script>
</body>

</html>
